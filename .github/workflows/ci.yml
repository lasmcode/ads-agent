# =============================================================================
# ADS Agent — Continuous Integration (CI) Pipeline
# Pipeline de gobernanza técnica y calidad automatizada en la nube
# =============================================================================

name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela ejecuciones en progreso si se sube nuevo código a la misma rama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "latest" # Permite usar siempre la velocidad optimizada del core de uv

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Linter, Formateador y Validación de Tipos Estáticos
  # ---------------------------------------------------------------------------
  quality:
    name: Code Quality & Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true # Activa la caché nativa de uv para acelerar el pipeline

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Project Dependencies
        run: uv sync --all-extras

      - name: Run Ruff Linter & Formatter Checks
        run: uv run ruff check src tests && uv run ruff format src tests --check

      - name: Run Static Type Checking (Mypy)
        run: uv run mypy src/

  # ---------------------------------------------------------------------------
  # Job 2: Suite de Pruebas Unitarias
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality # No ejecuta pruebas si la calidad básica falla
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Project Dependencies
        run: uv sync --all-extras

      - name: Run Unit Tests with Coverage
        run: uv run pytest -m unit -v
        env:
          APP_ENV: test
          APP_LOG_LEVEL: WARNING